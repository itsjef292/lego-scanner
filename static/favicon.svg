<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="80" height="56">
  <!-- Azure brick: matches the header logo (brick.svg recoloured to the azure accent #3B9EFF) -->
  <!-- Brick body -->
  <rect x="2" y="16" width="76" height="32" rx="3" ry="3" fill="#3B9EFF" stroke="#1E5FB0" stroke-width="1.5"/>
  <!-- Front face highlight -->
  <rect x="4" y="18" width="72" height="28" rx="2" ry="2" fill="#6FB8FF" opacity="0.3"/>
  <!-- Bottom shadow -->
  <rect x="2" y="40" width="76" height="8" rx="3" ry="3" fill="#1E5FB0"/>

  <!-- Studs (2x4 = 8 studs) -->
  <ellipse cx="12" cy="15" rx="7" ry="3.5" fill="#5AAEFF" stroke="#1E5FB0" stroke-width="1"/>
  <rect x="5" y="8" width="14" height="7" fill="#3B9EFF"/>
  <ellipse cx="12" cy="8" rx="7" ry="3.5" fill="#7CC0FF" stroke="#1E5FB0" stroke-width="1"/>

  <ellipse cx="30" cy="15" rx="7" ry="3.5" fill="#5AAEFF" stroke="#1E5FB0" stroke-width="1"/>
  <rect x="23" y="8" width="14" height="7" fill="#3B9EFF"/>
  <ellipse cx="30" cy="8" rx="7" ry="3.5" fill="#7CC0FF" stroke="#1E5FB0" stroke-width="1"/>

  <ellipse cx="50" cy="15" rx="7" ry="3.5" fill="#5AAEFF" stroke="#1E5FB0" stroke-width="1"/>
  <rect x="43" y="8" width="14" height="7" fill="#3B9EFF"/>
  <ellipse cx="50" cy="8" rx="7" ry="3.5" fill="#7CC0FF" stroke="#1E5FB0" stroke-width="1"/>

  <ellipse cx="68" cy="15" rx="7" ry="3.5" fill="#5AAEFF" stroke="#1E5FB0" stroke-width="1"/>
  <rect x="61" y="8" width="14" height="7" fill="#3B9EFF"/>
  <ellipse cx="68" cy="8" rx="7" ry="3.5" fill="#7CC0FF" stroke="#1E5FB0" stroke-width="1"/>
</svg>
